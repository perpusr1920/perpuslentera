<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desain Web Perpustakaan</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap');

        /* Reset dasar */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #ffffff;
            color: #000000;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- BAGIAN HEADER (Logo & Navigasi) --- */
        header {
            text-align: center;
            padding: 60px 20px 40px 20px;
        }

        .logo {
            font-size: 24px; /* Ukuran sedikit disesuaikan agar pas */
            font-weight: 800;
            letter-spacing: 6px; /* Jarak disesuaikan untuk kata yang panjang */
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px; 
        }

        nav a {
            text-decoration: none;
            color: #000000;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        /* Gaya khusus untuk menu yang sedang aktif (kotak pada HOME) */
        nav a.active {
            border: 2px solid #000000;
            padding: 6px 14px;
            border-radius: 6px;
        }

        nav a:hover:not(.active) {
            color: #888888;
        }

        /* --- BAGIAN UTAMA (Teks & Gambar) --- */
        .hero-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 60px;
        }

        /* Teks sebelah kiri */
        .hero-text {
            flex: 1;
            padding-right: 40px;
        }

        .hero-text h1 {
            font-size: 52px;
            font-weight: 800;
            letter-spacing: 15px; 
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .hero-text p {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #333;
        }

        /* Gambar sebelah kanan */
        .hero-image {
            flex: 1.2; 
            display: flex;
            justify-content: flex-end;
        }

        .hero-image img {
            width: 100%;
            max-width: 600px;
            height: auto;
            border: none; /* Menghilangkan garis tepi */
        }
        
        /* --- TAMPILAN RESPONSIVE (Untuk HP/Tablet) --- */
        @media (max-width: 850px) {
            nav {
                flex-wrap: wrap;
                gap: 20px;
            }
            .hero-section {
                flex-direction: column;
                text-align: center;
                gap: 60px;
                padding: 0 20px;
            }
            .hero-text {
                padding-right: 0;
            }
            .hero-image {
                justify-content: center;
            }
            .hero-text h1 {
                font-size: 36px;
                letter-spacing: 8px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">PERPUSTAKAAN</div>
        <nav>
            <a href="#" class="active">HOME</a>
            <a href="#">ABOUT</a>
            <a href="#">SERVICE</a>
            <a href="#">WORKS</a>
            <a href="#">BLOG</a>
            <a href="#">CONTACT</a>
        </nav>
    </header>

    <main class="hero-section">
        
        <div class="hero-text">
            <h1>T H I N K<br>[ B E S T ]</h1>
            <p>コト・モノの[より良い]をクリエイティブする</p>
        </div>
        
        <div class="hero-image">
            <img src="ilustrasi-anda.png" alt="Ilustrasi membaca buku">
        </div>

    </main>

</body>
</html>
